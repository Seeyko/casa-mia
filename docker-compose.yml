services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_SECRET_PATH=${ADMIN_SECRET_PATH:-_admin}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - STATIC_DIR=/app/static
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads:/app/uploads
    expose:
      - "3000"
    networks:
      - dokploy-network

volumes:
  uploads:

networks:
  dokploy-network:
    external: true
